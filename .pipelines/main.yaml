# Main-branch pipeline — runs on push to main.
#
# Runs everything ci.yaml does, then deploys data/ to Cosmos via the
# upsert runner. Cosmos credentials come from the ``biblegraph-cosmos``
# variable group (Library); secrets are referenced as env vars on the
# upsert step so they never leak into log output.

trigger:
  branches:
    include:
      - main

pr: none

resources:
  repositories:
    - repository: tools
      type: git
      name: tools
      ref: main

variables:
  - group: biblegraph-cosmos-prd

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    path: s/data
  - checkout: tools
    path: s/tools

  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.12"

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
      pip install ruff mypy
    displayName: Install dependencies
    workingDirectory: $(Build.SourcesDirectory)/tools

  - script: ruff check src tests
    displayName: Lint (ruff)
    workingDirectory: $(Build.SourcesDirectory)/tools

  - script: mypy src
    displayName: Type-check (mypy)
    workingDirectory: $(Build.SourcesDirectory)/tools

  - script: pytest --cov=src --cov-fail-under=80 --junitxml=junit/test-results.xml
    displayName: Run tests with coverage
    workingDirectory: $(Build.SourcesDirectory)/tools

  - script: python -m src.validate.runner --data-dir ../data
    displayName: Validate data/ against schema
    workingDirectory: $(Build.SourcesDirectory)/tools

  - task: PublishTestResults@2
    inputs:
      testResultsFiles: tools/junit/test-results.xml
    condition: always()

  - bash: python -m src.upsert.runner --data-dir ../data --apply
    displayName: Upsert data to Cosmos
    workingDirectory: $(Build.SourcesDirectory)/tools
    env:
      COSMOS_ENDPOINT: $(COSMOS_ENDPOINT)
      COSMOS_KEY: $(COSMOS_KEY)
      COSMOS_DATABASE: $(COSMOS_DATABASE)
      COSMOS_CONTAINER: $(COSMOS_CONTAINER)
      GREMLIN_ENDPOINT: $(GREMLIN_ENDPOINT)
      GREMLIN_KEY: $(GREMLIN_KEY)
      GREMLIN_DATABASE: $(GREMLIN_DATABASE)
      GREMLIN_CONTAINER: $(GREMLIN_CONTAINER)

  - bash: python -m src.reconcile.runner --data-dir ../data --apply
    displayName: Reconcile orphans in Cosmos
    workingDirectory: $(Build.SourcesDirectory)/tools
    env:
      COSMOS_ENDPOINT: $(COSMOS_ENDPOINT)
      COSMOS_KEY: $(COSMOS_KEY)
      COSMOS_DATABASE: $(COSMOS_DATABASE)
      COSMOS_CONTAINER: $(COSMOS_CONTAINER)
      GREMLIN_ENDPOINT: $(GREMLIN_ENDPOINT)
      GREMLIN_KEY: $(GREMLIN_KEY)
      GREMLIN_DATABASE: $(GREMLIN_DATABASE)
      GREMLIN_CONTAINER: $(GREMLIN_CONTAINER)

  - bash: python -m src.verify.runner --data-dir ../data
    displayName: Verify Cosmos integrity
    workingDirectory: $(Build.SourcesDirectory)/tools
    env:
      COSMOS_ENDPOINT: $(COSMOS_ENDPOINT)
      COSMOS_KEY: $(COSMOS_KEY)
      COSMOS_DATABASE: $(COSMOS_DATABASE)
      COSMOS_CONTAINER: $(COSMOS_CONTAINER)
      GREMLIN_ENDPOINT: $(GREMLIN_ENDPOINT)
      GREMLIN_KEY: $(GREMLIN_KEY)
      GREMLIN_DATABASE: $(GREMLIN_DATABASE)
      GREMLIN_CONTAINER: $(GREMLIN_CONTAINER)

  - task: PublishTestResults@2
    inputs:
      testResultsFiles: tools/junit/verify-results.xml
      testRunTitle: Verify
    condition: always()

  # Reindex stage — runs after upsert/reconcile/verify so embeddings
  # and inferred edges in Cosmos always reflect the just-deployed
  # data. The underlying GraphIndexer is idempotent: nodes whose
  # contentHash has not changed since the previous run are skipped
  # (cached), so re-running on unchanged data is a near no-op. Runs
  # only if every preceding step on this job succeeded (default
  # `condition: succeeded()`), so a failed upsert never triggers a
  # partial reindex.
  #
  # The reindex script lives under `tools/reindex/` (a Node
  # sub-project alongside the Python pipeline tooling) so this stage
  # reuses the already-checked-out `tools` repo — no separate `app`
  # checkout needed.
  - task: NodeTool@0
    inputs:
      versionSpec: "22.x"
    displayName: Use Node 22

  - bash: corepack enable && corepack prepare pnpm@latest --activate
    displayName: Enable pnpm via corepack

  - bash: pnpm install --frozen-lockfile
    displayName: pnpm install (tools/reindex)
    workingDirectory: $(Build.SourcesDirectory)/tools/reindex

  - bash: pnpm run reindex
    displayName: Reindex embeddings and inferred edges
    workingDirectory: $(Build.SourcesDirectory)/tools/reindex
    env:
      LLM_PROVIDER: $(LLM_PROVIDER)
      COSMOS_ENDPOINT: $(COSMOS_ENDPOINT)
      COSMOS_KEY: $(COSMOS_KEY)
      COSMOS_DATABASE: $(COSMOS_DATABASE)
      COSMOS_CONTAINER: $(COSMOS_CONTAINER)
      COSMOS_INFERRED_EDGES_CONTAINER: $(COSMOS_INFERRED_EDGES_CONTAINER)
      GREMLIN_ENDPOINT: $(GREMLIN_ENDPOINT)
      GREMLIN_KEY: $(GREMLIN_KEY)
      GREMLIN_DATABASE: $(GREMLIN_DATABASE)
      GREMLIN_CONTAINER: $(GREMLIN_CONTAINER)
      AZURE_OPENAI_API_KEY: $(AZURE_OPENAI_API_KEY)
      AZURE_OPENAI_ENDPOINT: $(AZURE_OPENAI_ENDPOINT)
      AZURE_OPENAI_DEPLOYMENT: $(AZURE_OPENAI_DEPLOYMENT)
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: $(AZURE_OPENAI_EMBEDDING_DEPLOYMENT)
      AZURE_OPENAI_EMBEDDING_DIMENSIONS: $(AZURE_OPENAI_EMBEDDING_DIMENSIONS)
